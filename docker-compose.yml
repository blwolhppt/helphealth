services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: healthhelp
      POSTGRES_USER: healthuser
      POSTGRES_PASSWORD: healthpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthuser -d healthhelp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://172.18.0.1:11434
      - DB_NAME=healthhelp
      - DB_USER=healthuser
      - DB_PASSWORD=healthpass
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=django-insecure-change-me
      - DEBUG=True
      - ALLOWED_HOSTS=*
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume: